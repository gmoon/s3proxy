id: REQ-TEST-002
type: requirement
title: De-flake streaming-memory RSS bound under V8 coverage instrumentation
body: 'gmoon PR #154. test/streaming-memory.test.ts''s peak-RSS<50MB assertion flaked repeatedly in CI''s Coverage step (observed 57-62MB vs. the 50MB bound), always passing on re-run and never failing in the plain Unit Tests step. Cause: V8 coverage instrumentation inflates process RSS and shifts GC timing, so the measurement reflects instrumentation overhead, not s3proxy''s buffering behavior -- the metric is only valid un-instrumented. Distinct from REQ-BUILD-002 (which is about vitest pool:forks startup cost, not measurement validity).'
