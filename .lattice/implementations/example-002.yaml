id: IMP-EXAMPLE-002
type: implementation
title: Container server consolidated to forkzero/s3proxy-docker; local tsx CI targets
body: 'Commit 857409a (PR #156), plus context commits 4496eb2 (#153) and 0033a05 (#155). Deleted examples/fastify-docker.ts and examples/Dockerfile. Replaced *-docker Make targets with local tsx equivalents (conformance-local, validation-local; artillery-local kept its name); factored the boot/wait/run/cleanup boilerplate into scripts/with-local-server.sh. conformance-local/validation-local default to examples/fastify-basic.ts, whose XML error bodies match the published image''s error contract. CI: Validation + Performance jobs run the -local targets (no Docker build, no Build step -- tsx runs src/ directly); the published image is built and conformance-tested in forkzero/s3proxy-docker''s own CI. Also: README Deployment section documents Docker / AWS Fargate / local-dev-creds paths (#153); examples/aws-ecs/ (the account-specific ECS stack) was removed from this repo and relocated with git history to the private forkzero/s3proxy-ops repo (#155), leaving a link to the reusable Fargate reference stack in forkzero/s3proxy-docker/deploy/aws-ecs. Verified locally: conformance-local, validation-local (24/24), and artillery-local all exit 0. Net -148 lines in #156.'
