edges:
  satisfies:
  - target: REQ-CORE-008
    version: 1.0.0
  validates:
  - target: THX-PURE-FETCH
    version: 1.0.0
    rationale: pipe()/middleware()/staticSite() are all built on the pure fetch() primitive with zero changes to fetch() itself -- direct evidence that fetch()'s triple is a sufficient foundation for higher-level ergonomic layers
  - target: THX-CORE-VALUE
    version: 1.0.0
    rationale: writeBody() pipes the S3 stream straight to the Node response with no intermediate buffering, delivering the stream-without-buffering value prop through the one-call ergonomic surface, not just the pure fetch() primitive
  - target: THX-TYPED-ERRORS
    version: 1.0.0
    rationale: pipe()/middleware() render honest 404/403/416 (via the same typed S3ProxyError classification) instead of v3's swallowed empty-200, and middleware()/staticSite() forward unexpected errors to next() rather than swallowing them
