id: IMP-CORE-006
type: implementation
title: pipe()/middleware()/staticSite() Node convenience layers
body: 'Commit e395019 (PR #129, closes #126 #127). Added pipe(), middleware(), staticSite() to src/index.ts, refactored onto private fetchKey()/writeBody()/onHandlerError()/renderError() seams. examples/express-basic.ts converted to middleware(); new examples/static-site.ts (mounted with app.use) demonstrates staticSite(). Both covered by the smoke gate against a real bucket (scripts/smoke-examples.sh extended with overridable SMOKE_EXAMPLES + the static-site example). New test/pipe.test.ts (pipe/middleware: happy path, honest 404, never-rejects, range passthrough, next()-forwarding, mid-stream failure) and test/static-site.test.ts (index-document resolution, error-document with original 4xx status, fallback when the error document itself is missing, fetch() unaffected). New FakeResponse/serve() test doubles in test/helpers/http-mocks.ts; new public RequestHandler type in src/types.ts.'
status: active
