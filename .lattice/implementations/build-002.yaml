body: 'Commits 4e01d4d (#143), 81e79ad (#150), 8800421 (#151), 4dd2102 (#152). Removed shared-testing/ (configs, scenarios, utils, README); added @forkzero/s3-website-test-kit as a devDependency plus .npmrc pinning the @forkzero scope to public npm. Makefile TEST_KIT var points at node_modules/@forkzero/s3-website-test-kit. Added make conformance-docker (later renamed conformance-local in PR #156): stands up a test image/server, then runs the kit''s expect-enabled conformance config against scenarios/core/conformance.yml and scenarios/s3proxy/error-contract.yml, wired into the CI Performance Tests job as a fail-fast step before the load run. Verified locally each step (artillery-docker/artillery-local 0 failures; conformance 16/16 core + 4/4 error-contract expectations passing against the built container).'
