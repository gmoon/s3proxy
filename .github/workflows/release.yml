name: Release
on:
  release:
    types: [published]
  workflow_dispatch:

# npm trusted publishing (OIDC) mints a short-lived token per run instead of a
# stored NPM_TOKEN. Requires a Trusted Publisher configured for the package on
# npmjs.com (repo + this workflow file). id-token: write lets the runner
# request the OIDC token; contents: read is enough for checkout.
permissions:
  contents: read
  id-token: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:unit

      - name: Verify package contents
        run: npm pack --dry-run

      # OIDC trusted publishing needs npm >= 11.5.1. Upgrade here, after the
      # build/test steps have run under the Node-bundled npm, so the newer
      # npm's install-time behavior changes never affect `npm ci` or the build.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        # No token: authentication is the OIDC exchange against the configured
        # Trusted Publisher. Provenance is attached automatically.
        run: npm publish
